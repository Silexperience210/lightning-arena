# LND Configuration for Lightning Arena

[Application Options]
; Node identity
alias=LightningArena
;color=#f7931a

; Network (mainnet, testnet, signet, simnet, regtest)
network=testnet

; Data directory
datadir=~/.lnd/data
logdir=~/.lnd/logs

; Accept keysend payments (for spontaneous payments)
accept-keysend=true

; Allow circular payments (for rebalancing)
allow-circular-route=true

; Minimum confirmations for funding
defaultchanconfs=3

; Minimum HTLC size
minchansize=10000
maxchansize=16777215

; RPC settings
rpclisten=0.0.0.0:10009
restlisten=0.0.0.0:8080

; Disable REST TLS for local dev (enable in production!)
; no-rest-tls=true

; Maximum pending channels
maxpendingchannels=10

; Auto pilot (disable - we manually manage channels)
autopilot.active=false

[Bitcoin]
bitcoin.active=true
bitcoin.node=bitcoind

[Bitcoind]
bitcoind.rpcuser=bitcoin
bitcoind.rpcpass=bitcoin
bitcoind.rpchost=localhost:8332
bitcoind.zmqpubrawblock=tcp://localhost:28332
bitcoind.zmqpubrawtx=tcp://localhost:28333

[autopilot]
autopilot.active=false

[protocol]
protocol.wumbo-channels=true

[db]
db.bolt.auto-compact=true

[wtclient]
wtclient.active=true

[healthcheck]
healthcheck.chainbackend.interval=1m
healthcheck.chainbackend.timeout=10s
