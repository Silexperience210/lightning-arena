# =====================================================
# LIGHTNING ARENA - Docker Compose
# Full stack: Node.js + PostgreSQL + Redis + LND
# =====================================================

version: '3.8'

services:
  # Main API Server
  api:
    build: .
    container_name: lightning-arena-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=lightning_arena
      - DB_USER=lightning
      - DB_PASSWORD=${DB_PASSWORD:-change_me_in_production}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-generate_a_strong_random_secret}
      - NWC_ENCRYPTION_KEY=${NWC_ENCRYPTION_KEY:-generate_32_byte_hex_key}
      - LND_GRPC_HOST=lnd:10009
      - LND_MACAROON_PATH=/app/lnd/admin.macaroon
      - LND_TLS_CERT_PATH=/app/lnd/tls.cert
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - lnd-data:/app/lnd:ro
    depends_on:
      - postgres
      - redis
      - lnd
    networks:
      - lightning-arena
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (React)
  frontend:
    build: ./frontend
    container_name: lightning-arena-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3001
    depends_on:
      - api
    networks:
      - lightning-arena
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: lightning-arena-db
    environment:
      - POSTGRES_DB=lightning_arena
      - POSTGRES_USER=lightning
      - POSTGRES_PASSWORD=${DB_PASSWORD:-change_me_in_production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - lightning-arena
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightning -d lightning_arena"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lightning-arena-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - lightning-arena
    restart: unless-stopped

  # LND Node (Bitcoin Lightning)
  lnd:
    image: lightninglabs/lnd:v0.17.4-beta
    container_name: lightning-arena-lnd
    environment:
      - LND_NETWORK=${LND_NETWORK:-testnet}
    volumes:
      - lnd-data:/root/.lnd
      - ./lnd.conf:/root/.lnd/lnd.conf:ro
    ports:
      - "9735:9735"     # P2P
      - "10009:10009"   # gRPC
      - "8080:8080"     # REST
    networks:
      - lightning-arena
    restart: unless-stopped

  # LND Monitor (optional - tracks incoming payments)
  lnd-mon:
    build: ./src/lnd-monitor
    container_name: lightning-arena-lnd-mon
    environment:
      - LND_HOST=lnd:10009
      - API_HOST=api:3001
      - REDIS_URL=redis://redis:6379
    volumes:
      - lnd-data:/app/lnd:ro
    depends_on:
      - lnd
      - api
    networks:
      - lightning-arena
    restart: unless-stopped

  # Background Worker (payment retries, cleanup)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: lightning-arena-worker
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=lightning_arena
      - DB_USER=lightning
      - DB_PASSWORD=${DB_PASSWORD:-change_me_in_production}
      - REDIS_URL=redis://redis:6379
      - LND_GRPC_HOST=lnd:10009
      - LND_MACAROON_PATH=/app/lnd/admin.macaroon
      - LND_TLS_CERT_PATH=/app/lnd/tls.cert
    volumes:
      - lnd-data:/app/lnd:ro
    depends_on:
      - postgres
      - redis
      - lnd
    networks:
      - lightning-arena
    restart: unless-stopped

  # Nginx Reverse Proxy (production)
  nginx:
    image: nginx:alpine
    container_name: lightning-arena-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    networks:
      - lightning-arena
    restart: unless-stopped
    profiles:
      - production

# Volumes
volumes:
  postgres-data:
  redis-data:
  lnd-data:

# Networks
networks:
  lightning-arena:
    driver: bridge
